name: 'Quay OIDC Auth'
description: 'Authenticate to Quay.io or private Quay instances using GitHub OIDC federation for robot accounts'
branding:
  icon: lock
  color: red

inputs:
  hostname:
    description: 'The Quay server hostname'
    required: false
    default: 'quay.io'
  username:
    description: 'The Quay robot account name (e.g., org+robot_name)'
    required: true
  protocol:
    description: 'Protocol to use (http or https)'
    required: false
    default: 'https'
  tls-certificate:
    description: 'Custom TLS/CA certificate (PEM format) for private Quay instances'
    required: false
  verify-ssl:
    description: 'Whether to verify SSL certificates'
    required: false
    default: 'true'

outputs:
  token:
    description: 'Short-lived Quay robot account token'
  username:
    description: 'The Quay robot account username'
  expiration:
    description: 'Token expiration time in ISO 8601 format'

runs:
  using: 'node24'
  main: 'dist/index.js'
